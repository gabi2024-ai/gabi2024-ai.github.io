<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Densidad Urbana · Gran Santiago</title>
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.plot.ly/plotly-3.4.0.min.js"></script>
</head>
<body>

<div id="app">

  <header id="header">
    <h1>Densidad Urbana · <span>Gran Santiago</span></h1>
    <span class="header-meta">INE r13_zonas · Zonas censales</span>
  </header>

  <aside id="sidebar">

    <!-- Stats -->
    <div class="sidebar-section">
      <div class="sidebar-label">Resumen general</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="val" id="stat-zones">—</div>
          <div class="lbl">Zonas censales</div>
        </div>
        <div class="stat-card">
          <div class="val" id="stat-comunas">—</div>
          <div class="lbl">Comunas</div>
        </div>
        <div class="stat-card">
          <div class="val" id="stat-max">—</div>
          <div class="lbl">Densidad máx.</div>
        </div>
        <div class="stat-card">
          <div class="val" id="stat-avg">—</div>
          <div class="lbl">Densidad media</div>
        </div>
      </div>
    </div>

    <div id="bar-container">
      <div class="bar-header">Top comunas · densidad media</div>
      <div id="bar-chart"></div>
    </div>

    <div id="info-box">
      <div class="info-empty">← Haz clic en una zona del mapa</div>
    </div>

  </aside>

  <main id="map-container">
    <div id="map"></div>

    <div id="loading">
      <div class="loader-text">Cargando datos geoespaciales…</div>
      <div class="loader-bar"></div>
    </div>

    <div id="source">Fuente: INE r13_zonas · Gran Santiago</div>
  </main>

</div>

<script src="main.js"></script>
</body>
</html>
